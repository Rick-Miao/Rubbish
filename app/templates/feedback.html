{% extends 'base.html' %}

{% block content %}
<!-- 顶部导航栏 -->
<nav class="navbar bg-white border-bottom sticky-top">
    <div class="container-fluid position-relative py-2">
        <!-- 返回按钮 -->
        <a href="javascript:history.back()" class="btn btn-link text-dark text-decoration-none p-0">
            <i class="bi bi-chevron-left fs-3"></i>
        </a>
        
        <!-- 页面标题 (绝对定位实现完美居中，无需右侧占位元素) -->
        <h1 class="h5 fw-bold mb-0 position-absolute start-50 top-50 translate-middle">人工纠错</h1>
    </div>
</nav>

<div class="container-fluid p-4">
    <!-- 全局提示消息 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <!-- 增加 pe-5 防止长文本与关闭按钮重叠 -->
                <div class="alert alert-warning alert-dismissible fade show py-2 pe-5" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>{{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('main.feedback', record_id=record_id) }}">
        
        <!-- 关联信息展示 (并排显示以节省垂直空间) -->
        <div class="row mb-4">
            <div class="col-6">
                <label class="form-label text-secondary small mb-1">记录 ID</label>
                <input type="text" class="form-control form-control-sm bg-light text-muted" value="{{ record_id }}" readonly>
            </div>
            <div class="col-6">
                <label class="form-label text-secondary small mb-1">用户 ID</label>
                <input type="text" class="form-control form-control-sm bg-light text-muted" value="{{ user_id }}" readonly>
            </div>
        </div>

        <!-- 反馈详情输入区 -->
        <div class="mb-4">
            <label for="content" class="form-label fw-bold text-secondary">
                反馈内容 <span class="text-danger">*</span>
            </label>
            <textarea class="form-control" id="content" name="content" rows="6" 
                      placeholder="请详细描述您认为正确的分类，或补充该物品的投放注意事项..." required></textarea>
            <div class="form-text text-muted small">您的反馈将帮助我们一起完善垃圾分类数据库。</div>
        </div>

        <!-- 提交操作 -->
        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary py-3 fw-bold rounded-4 shadow-sm">
                <i class="bi bi-send-check me-2"></i>提交反馈
            </button>
        </div>
        
    </form>
</div>
{% endblock %}
