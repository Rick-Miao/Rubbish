{% extends "base.html" %}
{% set active_page = 'profile' %}

{% block content %}
<div class="container py-4">

    <div class="text-center mb-5 mt-4">
        <div class="mx-auto mb-3" style="width: 120px; height: 120px;">
            <img src="{{ user.avatar }}" 
                 alt="用户头像"
                 class="rounded-circle border border-4 border-white shadow-sm"
                 style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <h4 class="fw-bold mb-1">{{ user.nickname }}</h4>
        <small class="text-muted">{{ user.email }}</small>
    </div>

    <div class="row g-3 mx-0">
        <div class="col-12">
            <div class="bg-secondary-subtle p-3 text-center rounded-4">
                <a href="{{ url_for('main.history') }}" 
                   class="btn btn-light fw-semibold py-3 w-100 rounded-3 shadow-sm text-decoration-none text-dark">
                    <i class="bi bi-clock-history me-2"></i>历史记录
                </a>
            </div>
        </div>

        <div class="col-12">
            <div class="bg-secondary-subtle p-3 text-center rounded-4">
                <a href="{{ url_for('main.about') }}" class="btn btn-light fw-semibold py-3 w-100 rounded-3 shadow-sm text-decoration-none text-dark">
                    <i class="bi bi-info-circle me-2"></i>关于软件
                </a>
            </div>
        </div>

        {% if user.user_type == 'super' %}
        <div class="col-12">
            <div class="bg-secondary-subtle p-3 text-center rounded-4">
                <a href="{{ url_for('main.admin_review') }}" class="btn btn-light fw-semibold py-3 w-100 rounded-3 shadow-sm text-decoration-none text-dark">
                    <i class="bi bi-shield-check me-2"></i>人工纠错审核
                </a>
            </div>
        </div>
        {% endif %}
        
        <div class="col-12 mt-4">
            <a href="{{ url_for('main.logout') }}" class="btn btn-outline-danger w-100 py-3 rounded-4 fw-bold">
                退出登录
            </a>
        </div>
    </div>

</div>
{% endblock %}
