{% extends 'base.html' %}

{% block title %}垃圾索引 - 可回收物{% endblock %}

{% block content %}
<!-- ========================================== -->
<!-- 顶部导航栏 (复用之前的居中布局) -->
<!-- ========================================== -->
<nav class="navbar bg-white border-bottom sticky-top">
    <div class="container-fluid position-relative py-2">
        <!-- 左侧返回按钮 -->
        <a href="{{ url_for('main.index') }}" class="btn btn-link text-dark text-decoration-none p-0">
            <i class="bi bi-chevron-left fs-3"></i>
        </a>
        
        <!-- 居中标题 -->
        <h1 class="h5 fw-bold mb-0 position-absolute start-50 translate-middle-x">垃圾索引</h1>
        
        <!-- 右侧占位 -->
        <div style="width: 24px;"></div> 
    </div>
</nav>

<!-- ========================================== -->
<!-- 主体内容：左右布局 -->
<!-- ========================================== -->
<div class="container-fluid p-2 mt-2">
    <!-- d-flex 实现左右并排 -->
    <div class="d-flex" style="min-height: 80vh;">
        
        <!-- 1. 左侧蓝色纵列 -->
        <!-- 使用你之前指定的可回收物颜色 #266c86。如果想纯用 Bootstrap 类，可替换为 bg-primary -->
        <!-- 使用 <br> 实现文字竖排，无需任何 CSS -->
        <div class="text-white fw-bold fs-5 d-flex align-items-center justify-content-center text-center rounded-start-3" 
             style="width: 64px; background-color: #266c86;">
            可<br>回<br>收<br>物
        </div>
        
        <!-- 2. 右侧物品列表区域 -->
        <div class="flex-grow-1 ps-2">
            <!-- d-flex flex-column 垂直排列，gap-2 实现每行之间的间隙 -->
            <div class="d-flex flex-column gap-2">
                
                <!-- 物品行 1 -->
                <!-- border-top border-bottom 实现上下线，rounded-2 让边角圆润配合间隙 -->
                <div class="bg-white border-top border-bottom p-3 rounded-2 text-dark fw-medium d-flex align-items-center">
                    <i class="bi bi-phone text-secondary me-2"></i>
                    废手机
                </div>
                
                <!-- 物品行 2 -->
                <div class="bg-white border-top border-bottom p-3 rounded-2 text-dark fw-medium d-flex align-items-center">
                    <i class="bi bi-circle text-secondary me-2"></i>
                    瑜伽垫
                </div>
                
                <!-- 物品行 3 -->
                <div class="bg-white border-top border-bottom p-3 rounded-2 text-dark fw-medium d-flex align-items-center">
                    <i class="bi bi-hat-fedora text-secondary me-2"></i>
                    旧帽子
                </div>

                <!-- 可以继续添加更多物品... -->

            </div>
        </div>
        
    </div>
</div>
{% endblock %}
