{% extends 'base.html' %}

{% block content %}
<!-- 顶部导航栏 -->
<nav class="navbar bg-white border-bottom sticky-top">
    <div class="container-fluid position-relative py-2">
        <!-- 返回按钮 -->
        <a href="{{ url_for('main.index') }}" class="btn btn-link text-dark text-decoration-none p-0">
            <i class="bi bi-chevron-left fs-3"></i>
        </a>
        
        <!-- 页面标题 (绝对定位实现水平与垂直完美居中) -->
        <h1 class="h5 fw-bold mb-0 position-absolute top-50 start-50 translate-middle">垃圾索引</h1>
    </div>
</nav>

<!-- 主体内容区 -->
<div class="container-fluid p-2 mt-2">
    <div class="d-flex" style="min-height: 80vh;">
        
        <!-- 左侧分类名称纵列 -->
        <div class="text-white fw-bold fs-5 d-flex align-items-center justify-content-center text-center rounded-start-3" 
             style="width: 64px; background-color: {{ category_color }};">
            {{ category.name }}
        </div>
        
        <!-- 右侧物品列表 -->
        <div class="flex-grow-1 ps-2">
            <div class="d-flex flex-column gap-2">
                
                {% for item in items %}
                    <a href="{{ url_for('main.detail', item_name=item.name) }}" class="text-decoration-none text-dark d-block">
                        <div class="bg-white border p-3 rounded-2 d-flex align-items-center shadow-sm">
                            <!-- 物品图标 -->
                            <i class="bi bi-box-seam text-secondary me-3"></i>
                            
                            <!-- 物品名称 -->
                            <span class="flex-grow-1 fw-medium">{{ item.name }}</span>
                            
                            <!-- 右侧指示箭头 -->
                            <i class="bi bi-chevron-right text-muted"></i>
                        </div>
                    </a>
                {% endfor %}
                
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
