{% extends "base.html" %}

{% block content %}
<!-- 顶部导航栏 -->
<nav class="navbar bg-white border-bottom sticky-top">
    <div class="container-fluid position-relative py-2">
        <!-- 返回按钮 -->
        <a href="{{ url_for('main.profile') }}" class="btn btn-link text-dark text-decoration-none p-0">
            <i class="bi bi-chevron-left fs-3"></i>
        </a>
        
        <!-- 页面标题 (利用绝对定位实现完美居中) -->
        <h1 class="h5 fw-bold mb-0 position-absolute start-50 translate-middle-x">历史记录</h1>
        
        <!-- 右侧占位，用于维持标题的绝对居中 -->
        <div style="width: 24px;"></div> 
    </div>
</nav>

<!-- 历史记录列表 -->
<div class="container-fluid p-0">
    <!-- 使用 list-group-flush 去除外边框，使列表贴满屏幕边缘 -->
    <div class="list-group list-group-flush">
        
        {% for group in history_data %}
        
        <!-- 日期分组标题 -->
        <div class="list-group-item bg-light text-muted fw-bold small px-3 py-2 border-0">
            {{ group.date }}
        </div>
        
        <!-- 具体识别记录 -->
        {% for item in group['items'] %}
        <a href="{{ url_for('main.detail', item_name=item.item_name, from='record', record_id=item.record_id) }}" class="list-group-item list-group-item-action d-flex align-items-center px-3 py-3">
            
            <!-- 物品缩略图容器 -->
            <div class="bg-light rounded-3 d-flex align-items-center justify-content-center me-3 flex-shrink-0" style="width: 48px; height: 48px;">
                <img src="{{ url_for('main.uploaded_file', filename=item.timestamp ~ '.jpg') }}" 
                     class="w-100 h-100" 
                     style="object-fit: cover;"
                     onerror="this.style.display='none'">
            </div>
            
            <!-- 物品名称与分类 -->
            <div class="flex-grow-1">
                <div class="fw-bold text-dark">{{ item.name }}</div>
                <div class="text-muted small">{{ item.category }}</div>
            </div>
            
            <!-- 识别时间 -->
            <span class="text-muted small ms-2">{{ item.time }}</span>
            
        </a>
        {% endfor %}
        
        {% endfor %}
        
        <!-- 空状态提示 -->
        {% if not history_data %}
        <div class="text-center text-muted py-5">
            <i class="bi bi-clock-history fs-1 d-block mb-2"></i>
            <p>暂无历史记录</p>
        </div>
        {% endif %}

    </div>
</div>
{% endblock %}
