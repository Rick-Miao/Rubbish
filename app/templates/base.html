<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}垃圾分类助手{% endblock %}</title>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light pb-5"> <!-- 底部留白，防止内容被固定导航栏遮挡 -->

    {% block content %}{% endblock %}
    
    <!-- 底部固定导航栏 -->
    <nav class="navbar fixed-bottom bg-white border-top">
        <div class="container-fluid p-0">
            <ul class="nav nav-justified w-100">
                <!-- 物品识别 -->
                <li class="nav-item">
                    <a class="nav-link py-2 {% if active_page == 'identify' %}text-primary active{% else %}text-secondary{% endif %}" href="{{ url_for('main.index') }}">
                        <i class="bi bi-camera-fill fs-4 d-block text-center mb-1"></i>
                        <span class="small d-block text-center">物品识别</span>
                    </a>
                </li>
                
                <!-- 文字识别 -->
                <li class="nav-item">
                    <a class="nav-link py-2 {% if active_page == 'search' %}text-primary active{% else %}text-secondary{% endif %}" href="{{ url_for('main.search') }}">
                        <i class="bi bi-text-left fs-4 d-block text-center mb-1"></i>
                        <span class="small d-block text-center">文字识别</span>
                    </a>
                </li>
                
                <!-- 我的 -->
                <li class="nav-item">
                    <a class="nav-link py-2 {% if active_page == 'profile' %}text-primary active{% else %}text-secondary{% endif %}" href="{{ url_for('main.profile') }}">
                        <i class="bi bi-person-circle fs-4 d-block text-center mb-1"></i>
                        <span class="small d-block text-center">我的</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
