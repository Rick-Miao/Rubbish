{% extends "base.html" %}
{% set active_page = 'profile' %}
{% block title %}注册 - 垃圾分类助手{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center min-vh-100 pb-5">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">创建账号</h2>
        <p class="text-muted">加入我们，一起保护地球</p>
    </div>

    <form method="POST" action="{{ url_for('main.register') }}" class="px-2" enctype="multipart/form-data">
        <div class="mb-3">
            <div class="input-group shadow-sm rounded-4 overflow-hidden border">
                <span class="input-group-text bg-white border-0 text-secondary ps-3"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control border-0 py-3 shadow-none" placeholder="邮箱账号" required>
            </div>
        </div>
        <div class="mb-3">
            <div class="input-group shadow-sm rounded-4 overflow-hidden border">
                <span class="input-group-text bg-white border-0 text-secondary ps-3"><i class="bi bi-person"></i></span>
                <input type="text" name="nickname" class="form-control border-0 py-3 shadow-none" placeholder="您的昵称" required>
            </div>
        </div>
        <div class="mb-3">
            <div class="input-group shadow-sm rounded-4 overflow-hidden border">
                <span class="input-group-text bg-white border-0 text-secondary ps-3"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control border-0 py-3 shadow-none" placeholder="设置密码" required>
            </div>
        </div>
        
        <div class="mb-4">
            <label for="avatarInput" class="form-label text-muted small ms-2 mb-1">上传个人头像（可选）</label>
            <input type="file" name="avatar" id="avatarInput" class="form-control form-control-lg rounded-4 shadow-sm border text-secondary" accept="image/*">
        </div>
        
        <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold fs-5 shadow-sm mb-3">注 册</button>
        
        <div class="text-center mt-3">
            <span class="text-muted">已有账号？</span>
            <a href="{{ url_for('main.login') }}" class="text-primary fw-bold text-decoration-none">返回登录</a>
        </div>
    </form>
</div>
{% endblock %}
