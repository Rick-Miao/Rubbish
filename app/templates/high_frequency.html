{% extends 'base.html' %}

{% block content %}
<!-- 顶部视觉区 (Hero) -->
<div class="position-relative text-white mb-4" style="height: 250px; background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); background-size: cover; background-position: center;">
    <!-- 黑色半透明遮罩，提升文字可读性 -->
    <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark bg-opacity-50"></div>
    
    <div class="position-relative z-1 d-flex flex-column justify-content-center h-100 px-4">
        <!-- 返回按钮 -->
        <a href="{{ url_for('main.index') }}" class="text-white text-decoration-none fs-4 mb-3">
            <i class="bi bi-chevron-left"></i>
        </a>
        <h1 class="display-5 fw-bold mb-1">高频垃圾</h1>
        <p class="fs-6 opacity-75 mb-0">分类焕新城市</p>
    </div>
</div>

<!-- 列表内容区 -->
<div class="container pb-5">
    <div class="list-group shadow-sm">
        
        {% if items %}
            {% for item in items %}
            <!-- 列表项：点击跳转至物品详情页 -->
            <a href="{{ url_for('main.detail', item_name=item.name) }}" class="list-group-item list-group-item-action border-0 py-3">
                <div class="d-flex align-items-center">
                    
                    <!-- 物品缩略图 -->
                    <img src="{{ item.item_url }}" alt="{{ item.name }}" class="rounded flex-shrink-0 me-3"
                         style="width: 80px; height: 80px; object-fit: cover;"
                         onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                    
                    <!-- 物品文本信息 -->
                    <div class="flex-grow-1">
                        <h5 class="mb-1 fw-bold text-dark">{{ item.name }}</h5>
                        <!-- 使用 Bootstrap 的 text-truncate 实现优雅的文本溢出截断 -->
                        <small class="text-muted d-block text-truncate" style="max-width: 200px;">
                            {{ item.description or item.category.name }}
                        </small>
                    </div>
                    
                    <!-- 右侧指示箭头 -->
                    <i class="bi bi-chevron-right fs-5 text-secondary ms-2"></i>
                    
                </div>
            </a>
            {% endfor %}
            
        {% else %}
            <!-- 空状态提示 -->
            <div class="text-center py-5 text-muted">
                <p class="mb-0">暂无高频垃圾数据</p>
            </div>
        {% endif %}

    </div>
</div>
{% endblock %}
