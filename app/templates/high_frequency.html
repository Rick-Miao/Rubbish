<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高频垃圾 - 分类焕新城市</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Bootstrap Icons 用于显示箭头 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <!-- 顶部 Hero 区域 (模拟图片上半部分) -->
    <div class="container-fluid p-0 mb-4">
        <!-- 使用内联样式设置背景图，实际项目中建议使用 url_for -->
        <div class="position-relative text-white"
            style="height: 250px; background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); background-size: cover; background-position: center;">
            <!-- 黑色遮罩层，让文字更清晰 -->
            <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"></div>

            <div class="position-relative z-1 d-flex flex-column justify-content-center h-100 px-4">
                <!-- 返回按钮 (可选) -->
                <a href="{{ url_for('main.index') }}" class="text-white text-decoration-none fs-4 mb-3">
                    <i class="bi bi-chevron-left"></i>
                </a>

                <h1 class="display-4 fw-bold mb-0">高频垃圾</h1>
                <p class="fs-5 opacity-75">分类焕新城市</p>
            </div>
        </div>
    </div>

    <!-- 列表区域 -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <!-- Bootstrap List Group 组件 -->
                <div class="list-group shadow-sm">

                    {% if items %}
                    <!-- 循环开始 -->
                    {% for item in items %}
                    <a href="#" class="list-group-item list-group-item-action border-0 py-3">
                        <div class="d-flex align-items-center">

                            <!-- 1. 左侧缩略图 -->
                            <div class="flex-shrink-0 me-3">
                                <!-- object-fit-cover 保证图片填满且不变形 -->
                                <img src="{{ item.item_url }}" alt="{{ item.name }}" class="rounded"
                                    style="width: 80px; height: 80px; object-fit: cover;"
                                    onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                            </div>

                            <!-- 2. 中间内容区 (序号 + 文本) -->
                            <div class="flex-grow-1 d-flex align-items-center">
                                <!-- 序号 -->
                                <span class="fw-bold text-secondary me-3 fs-5">{{ loop.index }}</span>

                                <!-- 文本详情 -->
                                <div class="d-flex flex-column">
                                    <!-- 物品名称 -->
                                    <h5 class="mb-1 fw-bold text-dark">{{ item.name }}</h5>
                                    <!-- 英文名称或描述 (如果数据库有英文名段则替换，这里暂用 description 或 category) -->
                                    <small class="text-muted">
                                        {% if item.description %}
                                        {{ item.description[:20] }}...
                                        {% else %}
                                        {{ item.category.name }}
                                        {% endif %}
                                    </small>
                                </div>
                            </div>

                            <!-- 3. 右侧箭头图标 -->
                            <div class="ms-2 text-secondary">
                                <i class="bi bi-chevron-right fs-5"></i>
                            </div>

                        </div>
                    </a>
                    {% endfor %}
                    <!-- 循环结束 -->

                    {% else %}
                    <!-- 空状态提示 -->
                    <div class="text-center py-5 text-muted">
                        <p>暂无高频垃圾数据</p>
                    </div>
                    {% endif %}

                </div>
            </div>
        </div>
    </div>

    <!-- 引入 Bootstrap JS (可选) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
