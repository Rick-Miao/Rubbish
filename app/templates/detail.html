{% extends 'base.html' %}
{% set active_page = 'identify' %}

{% block content %}
<div class="position-relative">
    <a href="javascript:history.back()" class="position-absolute top-0 start-0 m-3 text-dark text-decoration-none z-3">
        <i class="bi bi-chevron-left fs-1 fw-bold"></i>
    </a>
    <img src="{{ item.main_img }}" class="w-100 object-fit-cover" style="height: 250px;" alt="{{ item.name }}">
</div>

<div class="container-fluid p-4 bg-white">
    
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h1 class="fw-bold mb-1">{{ item.name }}</h1>
            <h5 class="text-dark">{{ item.category }}</h5>
        </div>
        <a href="#" class="text-danger small text-decoration-none mt-2">人工纠错</a>
    </div>

    <div class="mb-4">
        <h6 class="fw-bold mb-2">回收注意事项：</h6>
        <div class="text-dark small" style="white-space: pre-wrap; line-height: 1.8;">{{ item.guide }}</div>
    </div>

    <div class="mb-5">
        <h5 class="fw-bold mb-3">图片</h5>
        <div class="row g-2">
            {% for img_url in item.sub_imgs %}
            <div class="col-4">
                <img src="{{ img_url }}" class="w-100 rounded shadow-sm object-fit-cover" style="height: 120px;" alt="参考图">
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
