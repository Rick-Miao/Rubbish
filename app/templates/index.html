{% extends 'base.html' %}
{% set active_page = 'identify' %}

{% block content %}
<div class="container-fluid p-3">
    
    <!-- 顶部两个并排按钮 -->
    <div class="row g-3 mb-4">
        <div class="col-6">
            <a id="identifyBtn" href="#" class="btn btn-primary w-100 py-3 fs-5 fw-bold shadow-sm">
                <i class="bi bi-camera-fill me-2"></i>识别
            </a>
            <input type="file" id="cameraInput" accept="image/*" style="display: none;">
        </div>
        <div class="col-6">
            <a href="#" class="btn btn-outline-primary w-100 py-3 fs-5 fw-bold shadow-sm">
                <i class="bi bi-book-fill me-2"></i>分类指南
            </a>
        </div>
    </div>

    <!-- 高频易错垃圾 -->
    <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold text-secondary mb-0">高频易错垃圾</h6>
            <a href="{{ url_for('main.high_frequency_list') }}" class="text-decoration-none text-secondary fs-5">
                &gt;
            </a>
        </div>
        <div class="position-relative">
            <!-- d-flex + flex-nowrap + overflow-auto 实现纯 Bootstrap 横向滚动 -->
             <div class="d-flex flex-nowrap overflow-auto pb-2 gap-3">
                {% for item in high_freq_items %}
                    <a href="{{ url_for('main.detail', item_name=item.name) }}" class="text-decoration-none text-dark text-center" style="min-width: 100px;">
                        <img src="{{ item.item_url }}" class="rounded-3 border bg-white w-100" alt="{{ item.name }}">
                        <div class="small mt-2">{{ item.name }}</div>
                    </a>
                {% endfor %}
             </div>
        </div>
    </div>

    <!-- 垃圾索引 -->
    <div class="mb-4">
        <h6 class="fw-bold mb-3 text-secondary">垃圾索引</h6>
        <div class="row g-3">
            
            <!-- 可回收物 -->
            <div class="col-6">
                <a href="{{ url_for('main.category_detail', category_id=1) }}" class="btn d-flex align-items-center p-2 rounded-4 shadow-sm w-100 text-white text-decoration-none" 
                   style="height: 72px; background-color: #266c86; border-color: #266c86;">
                    <img src="{{ url_for('static', filename='images/可回收物.png') }}" class="me-2 rounded-2" style="width: 48px; height: 48px; object-fit: cover;" alt="可回收物">
                    <span class="fw-bold text-start flex-grow-1">可回收物</span>
                </a>
            </div>

            <!-- 有害垃圾 -->
            <div class="col-6">
                <a href="{{ url_for('main.category_detail', category_id=2) }}" class="btn d-flex align-items-center p-2 rounded-4 shadow-sm w-100 text-white text-decoration-none" 
                   style="height: 72px; background-color: #ff1504; border-color: #ff1504;">
                    <img src="{{ url_for('static', filename='images/有害垃圾.png') }}" class="me-2 rounded-2" style="width: 48px; height: 48px; object-fit: cover;" alt="有害垃圾">
                    <span class="fw-bold text-start flex-grow-1">有害垃圾</span>
                </a>
            </div>

            <!-- 厨余垃圾 -->
            <div class="col-6">
                <a href="{{ url_for('main.category_detail', category_id=3) }}" class="btn d-flex align-items-center p-2 rounded-4 shadow-sm w-100 text-white text-decoration-none" 
                   style="height: 72px; background-color: #26ac04; border-color: #26ac04;">
                    <img src="{{ url_for('static', filename='images/厨余垃圾.png') }}" class="me-2 rounded-2" style="width: 48px; height: 48px; object-fit: cover;" alt="厨余垃圾">
                    <span class="fw-bold text-start flex-grow-1">厨余垃圾</span>
                </a>
            </div>

            <!-- 其他垃圾 -->
            <div class="col-6">
                <a href="{{ url_for('main.category_detail', category_id=4) }}" class="btn d-flex align-items-center p-2 rounded-4 shadow-sm w-100 text-white text-decoration-none" 
                   style="height: 72px; background-color: #261504; border-color: #261504;">
                    <img src="{{ url_for('static', filename='images/其他垃圾.png') }}" class="me-2 rounded-2" style="width: 48px; height: 48px; object-fit: cover;" alt="其他垃圾">
                    <span class="fw-bold text-start flex-grow-1">其他垃圾</span>
                </a>
            </div>

        </div>
    </div>

</div>
<script>
    // 点击识别按钮 -> 触发文件选择
    document.getElementById('identifyBtn').addEventListener('click', function(e) {
        e.preventDefault();      // 阻止 <a> 的默认跳转
        document.getElementById('cameraInput').click();
    });

    // 当用户选择了图片后
    document.getElementById('cameraInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        // 显示加载状态
        const btn = document.getElementById('identifyBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>识别中...';
        btn.disabled = true;

        const formData = new FormData();
        formData.append('image', file);

        fetch("{{ url_for('main.identify_image') }}", {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            window.location.href = "/detail/" + encodeURIComponent(data.name);
        })
        .catch(error => {
            console.error('Error:', error);
            alert('网络错误，请稍后重试');
        })
        .finally(() => {
            const btn = document.getElementById('identifyBtn');
            btn.innerHTML = '<i class="bi bi-camera-fill me-2"></i>识别';
            btn.disabled = false;
            document.getElementById('cameraInput').value = '';
        });
    });
</script>

{% endblock %}
