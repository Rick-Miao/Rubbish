<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：禁止缩放，宽度等于设备宽度，适合手机浏览 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移动端任务管理</title>
    <style>
        /* 移动端基础样式 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background-color: #f5f5f7; 
            margin: 0; 
            color: #333;
        }
        h2 { text-align: center; margin-bottom: 20px; font-size: 1.2rem; }
        
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        
        /* 适合手指点击的大输入框和按钮 */
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; /* 防止 iOS 自动放大 */
            margin-bottom: 12px; 
            outline: none;
        }
        input[type="text"]:focus { border-color: #007AFF; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #007AFF; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
        }
        button:active { background-color: #0056b3; }
        
        .task-item { 
            padding: 12px 0; 
            border-bottom: 1px solid #eee; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-item:last-child { border-bottom: none; }
        .time { color: #999; font-size: 12px; }
        .empty-tip { text-align: center; color: #999; padding: 20px 0; }
    </style>
</head>
<body>
    <h2>📱 我的任务清单</h2>
    
    <!-- 添加任务表单 -->
    <div class="card">
        <form action="{{ url_for('main.add_task') }}" method="POST">
            <input type="text" name="title" placeholder="输入新任务..." required autocomplete="off">
            <button type="submit">添加任务</button>
        </form>
    </div>

    <!-- 任务列表展示 -->
    <div class="card">
        {% if tasks %}
            {% for task in tasks %}
                <div class="task-item">
                    <span>{{ task.title }}</span>
                    <span class="time">{{ task.created_at.strftime('%m-%d %H:%M') }}</span>
                </div>
            {% endfor %}
        {% else %}
            <p class="empty-tip">暂无任务，快去添加吧！</p>
        {% endif %}
    </div>
</body>
</html>
